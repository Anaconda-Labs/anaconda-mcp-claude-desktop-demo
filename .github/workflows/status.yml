name: Update Status Badge

on:
  push:
    branches: [main]
  schedule:
    # Run daily at 9am UTC to check commit age
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history

      - name: Calculate days since last commit
        id: check_age
        run: |
          # Get the timestamp of the last commit
          LAST_COMMIT=$(git log -1 --format=%ct)
          CURRENT_TIME=$(date +%s)
          DAYS_OLD=$(( (CURRENT_TIME - LAST_COMMIT) / 86400 ))

          echo "Days since last commit: $DAYS_OLD"
          echo "days_old=$DAYS_OLD" >> $GITHUB_OUTPUT

          # Determine status based on age
          if [ $DAYS_OLD -gt 90 ]; then
            echo "status=needs-review" >> $GITHUB_OUTPUT
            echo "color=orange" >> $GITHUB_OUTPUT
            echo "message=Needs Review" >> $GITHUB_OUTPUT
          else
            echo "status=active" >> $GITHUB_OUTPUT
            echo "color=brightgreen" >> $GITHUB_OUTPUT
            echo "message=Active" >> $GITHUB_OUTPUT
          fi

      - name: Create status badge JSON
        run: |
          mkdir -p .github/badges
          cat > .github/badges/status.json << EOF
          {
            "schemaVersion": 1,
            "label": "status",
            "message": "${{ steps.check_age.outputs.message }}",
            "color": "${{ steps.check_age.outputs.color }}"
          }
          EOF

          cat .github/badges/status.json

      - name: Commit badge data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/status.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update status badge [skip ci]"
            git push
          fi
